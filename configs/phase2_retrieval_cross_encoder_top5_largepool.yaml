experiment:
  name: phase2_retrieval_cross_encoder_top5_largepool

dataset:
  path: data/raw/locomo10.json

ingestion:
  use_turn_as_claim: true
  claim_format: speaker_text
  skip_summary_turns: true
  min_turn_length: 3

embedding:
  model_name: BAAI/bge-small-en-v1.5
  dim: 384
  normalize: true
  batch_size: 64
  cache_dir: data/processed/embedding_cache

# Large-pool variant: 100-candidate pool fed to the cross-encoder.
# Higher recall ceiling for retrieval at the cost of more CE forward passes.
# Use this if top5 config recall plateaus; expect ~2-4x slower than top5 config.
retrieval:
  top_k: 5
  rrf_k: 60
  dense_candidates: 60
  bm25_candidates: 60
  enable_bm25: true
  enable_label_search: false
  enable_graph_traversal: false
  enable_source_evidence_lane: true
  source_context_window: 2
  source_bm25_top_n: 50
  source_lane_rrf_weight: 1.0
  rerank_pool_size: 0
  enable_candidate_pool_selector: false
  enable_cross_encoder: true
  cross_encoder_model: BAAI/bge-reranker-base
  cross_encoder_weight: 3.0
  cross_encoder_batch_size: 32
  cross_encoder_max_length: 512
  cross_encoder_pool_size: 100
  ce_superseded_penalty: 0.10
  ce_diversity_max_same_dia: 2

context:
  max_entries: 10

generation:
  enabled: false

guard:
  min_grounding_score: 0.0
  require_uncertainty_for_conflicts: true

evaluation:
  compute_f1: true
  compute_exact_match: true
  compute_evidence_recall: true

output:
  dir: results/phase2

db_dir: data/processed/phase2_db_ce_largepool
