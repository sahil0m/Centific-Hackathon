experiment:
  name: demo_fast
  seed: 42
  description: "Fast demo mode — dense+BM25 retrieval, no cross-encoder"

dataset:
  name: locomo
  path: data/raw/locomo10.json
  split: all

chunking:
  strategy: turn
  window_size: 1
  include_speaker: true
  include_timestamp: true
  include_session_id: true

embedding:
  provider: sentence_transformers
  model_name: BAAI/bge-small-en-v1.5
  batch_size: 64
  normalize_embeddings: true
  cache_dir: data/processed/embedding_cache

retrieval:
  index_type: faiss
  top_k: 5
  dense_candidates: 20
  bm25_candidates: 20
  enable_bm25: true
  enable_source_evidence_lane: false
  enable_cross_encoder: false
  same_conversation_only: true

generation:
  provider: openrouter
  model_name: anthropic/claude-3-haiku
  temperature: 0
  max_output_tokens: 150
  cache_dir: data/processed/llm_cache
  enabled: false

evaluation:
  compute_f1: true
  compute_exact_match: true
  compute_evidence_recall: true
  compute_latency: true
  compute_token_usage: true

output:
  dir: results
